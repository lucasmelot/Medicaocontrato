<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tutorial e contato Brasilata">
    <title>Brasilata | Tutorial</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero">
        <div class="container fade-in">

            <h1 class="hero-title">
                Tutorial de Suporte e Atendimento
            </h1>

            <p class="hero-subtitle">
                Assista ao vídeo abaixo para obter orientações rápidas e entre em contato caso precise de ajuda.
            </p>

        </div>
    </header>

    <main>

        <section class="video-section">
            <div class="container fade-in">

                <p class="video-description">
                    Confira o tutorial completo antes de entrar em contato.
                </p>

                <div class="video-wrapper">

                    <iframe
                        src="https://www.youtube.com/embed/0NcDCADlCCE"
                        title="Vídeo Tutorial"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>

                </div>

                <div class="contact-area">
                    <a
                        href="https://teams.microsoft.com/l/chat/0/0?users=lucas.melo@brasilata.com.br"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="teams-button"
                        aria-label="Entrar em contato pelo Microsoft Teams">

                        Entrar em contato pelo Microsoft Teams

                    </a>
                </div>

            </div>
        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
